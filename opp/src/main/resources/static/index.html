<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home page</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
</head>
<body>
    <div>
        <div id="tabs">
            <div id="register-tab" class="active">
                <p>Register</p>
            </div>
            <div id="login-tab">
                <p>Login</p>
            </div>
        </div>
        <form id="form">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Input username..." required>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Input password..." required>
            <label id="role-label" for="role">Role</label>
            <select id="role" required>
                <option id="defaultOption" disabled selected>Choose role</option>
                <option>EXECUTOR</option>
                <option>CLIENT</option>
            </select>
            <div id="buttons">
                <button type="submit" id="register">Register</button>
                <button type="submit" id="login">Login</button>
            </div>
        </form>
    </div>
    <p id="alertForm">Please fill out all fields.</p>
    <div id="toast-container">
    </div>
    <div class="toast" id="toast-error">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M14 25.6667C20.4433 25.6667 25.6666 20.4433 25.6666 14C25.6666 7.55667 20.4433 2.33333 14 2.33333C7.55666 2.33333 2.33331 7.55667 2.33331 14C2.33331 20.4433 7.55666 25.6667 14 25.6667Z" fill="#FF4D59"/>
<path d="M17.5 10.5L10.5 17.5M10.5 10.5L17.5 17.5" stroke="white" stroke-width="2.56667" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
            <div class="text">
                <p class="header">Error!</p>
                <p class="message">Something went wrong. Please try again.</p>
            </div>
    </div>
</body>
</html>
