name: Semgrep Security Scan
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v3
      - name: Run Semgrep
        run: semgrep --config semgrep-rules/ --config auto opp/ --error