name: OWASP ZAP Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot application
        run: |
          ./mvnw clean package -DskipTests

      - name: Start Spring Boot application
        run: |
          # Run in background
          java -jar target/*.jar &
          
          # Wait for application to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080/index.html > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 2
          done

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.6.0
        with:
          target: 'http://localhost:8080/v3/api-docs'
          format: 'openapi'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # for counting high-risk vulnerabilities
      - name: Upload ZAP Report (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-json-report
          path: report.json

      # for readable format
      - name: Upload ZAP Report (Markdown)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-md-report
          path: report.md

      - name: Check for High-Risk Vulnerabilities
        if: always()
        run: |
          if [ -f report.json ]; then
            HIGH_COUNT=$(jq '[.site[].alerts[] | select(.risk=="High")] | length' report.md 2>/dev/null || echo "0")
           
            echo "High risk issues: $HIGH_COUNT"
          
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "Found $HIGH_COUNT high-risk vulnerabilities!"
              echo "Please check the ZAP report artifacts for details."
              exit 1
            fi
          else
            echo "No report.json found"
          fi